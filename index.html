<html>
    <head>
        <title>Gråpusplagar</title>
    </head>
    
    <body>
        <p>score: <span id="score"> 0</span> </p>
        <img src="images/greypuss.png" height="256" width="256px" onclick="addToScore(clickingPower)">

        <button onclick="buyCursor()">Plagepinne [<span id="cursorcost">15</span>] -- <span id="cursors">0</span></button>
        <button onclick="buyStian()">StianSpark [<span id="stiancost">100</span>] -- <span id="stians">0</span></button>

        <script>
            var score= 0;
            var clickingPower=1

            var cursorCost=15;
            var cursors=0;

            var stiancost=100;
            var stians=0;

            function buyCursor() {
                if (score >= cursorCost){
                    score=score-cursorCost;
                    cursors= cursors + 1;
                    cursorCost=Math.round(cursorCost*1.15)

                    document.getElementById("score").innerHTML=score;
                    document.getElementById("cursorcost").innerHTML=cursorCost;
                    document.getElementById("cursors").innerHTML=cursors;
                }
            }

            function buyStian() {
                if (score >= stiancost){
                    score=score-stiancost;
                    stians= stians + 1;
                    stiancost=Math.round(stiancost*1.20)

                    document.getElementById("score").innerHTML=score;
                    document.getElementById("stiancost").innerHTML=stiancost;
                    document.getElementById("stians").innerHTML=stians;
                }
            }

            function addToScore(amount) {
                score=score+amount;
                document.getElementById("score").innerHTML=score;
            }

            setInterval(function(){
                score=score+cursors;
                score=score+stians * 5
                document.getElementById("score").innerHTML=score;

            },1000); //1000ms=1 sekund
        </script>
    </body>

</html>
